input_number:

  foxess_ems_min_soc:
    name: FoxESS EMS Min SOC
    min: 5
    max: 50
    step: 1
    unit_of_measurement: "%"
    initial: 20

  foxess_ems_max_soc:
    name: FoxESS EMS Max SOC Ceiling
    min: 50
    max: 100
    step: 1
    unit_of_measurement: "%"
    initial: 98

  foxess_ems_fd_soc:
    name: FoxESS EMS Force Discharge SOC
    min: 5
    max: 50
    step: 1
    unit_of_measurement: "%"
    initial: 20

  foxess_ems_fd_power:
    name: FoxESS EMS Force Discharge Power
    min: 0
    max: 10000
    step: 100
    unit_of_measurement: W
    initial: 4500

  energy_export_price:
    name: Energy Export Price
    min: 0
    max: 2
    step: 0.01
    unit_of_measurement: PLN/kWh
    initial: 0.40

  arbitrage_threshold:
    name: Arbitrage Threshold
    min: 0
    max: 1
    step: 0.01
    unit_of_measurement: PLN/kWh
    initial: 0.25

  battery_capacity_kwh:
    name: Battery Capacity
    min: 1
    max: 50
    step: 0.5
    unit_of_measurement: kWh
    initial: 10

  pv_forecast_today:
    name: PV Forecast Today
    min: 0
    max: 100
    step: 0.1
    unit_of_measurement: kWh
    initial: 10

  load_forecast_today:
    name: Load Forecast Today
    min: 0
    max: 100
    step: 0.1
    unit_of_measurement: kWh
    initial: 12

  tariff_cheap_price:
    name: Taryfa Dostawcy - Cheap Price
    min: 0
    max: 2
    step: 0.01
    unit_of_measurement: PLN/kWh
    initial: 0.50

  tariff_normal_price:
    name: Taryfa Dostawcy - Normal Price
    min: 0
    max: 2
    step: 0.01
    unit_of_measurement: PLN/kWh
    initial: 0.80

  tariff_normal_start_hour:
    name: Taryfa Dostawcy - Normal Start (godzina)
    min: 0
    max: 23
    step: 1
    unit_of_measurement: "h"
    icon: mdi:clock-start
    initial: 7

  tariff_normal_end_hour:
    name: Taryfa Dostawcy - Normal End (godzina)
    min: 0
    max: 23
    step: 1
    unit_of_measurement: "h"
    icon: mdi:clock-end
    initial: 13

  tariff_peak_price:
    name: Taryfa Dostawcy - Peak Price
    min: 0
    max: 2
    step: 0.01
    unit_of_measurement: PLN/kWh
    initial: 1.20

  tariff_peak_start_hour:
    name: Taryfa Dostawcy - Peak Start (godzina)
    min: 0
    max: 23
    step: 1
    unit_of_measurement: "h"
    icon: mdi:clock-start
    initial: 16

  tariff_peak_end_hour:
    name: Taryfa Dostawcy - Peak End (godzina)
    min: 0
    max: 23
    step: 1
    unit_of_measurement: "h"
    icon: mdi:clock-end
    initial: 21

input_text:

  foxess_last_signature:
    name: FoxESS Last Signature

input_datetime:

  ems_last_mode_change:
    name: EMS Last Mode Change
    has_date: true
    has_time: true

input_select:

  ems_control_mode:
    name: EMS Control Mode
    options:
      - auto
      - force_charge
      - force_discharge
      - force_export
      - maintenance
    initial: auto

input_boolean:

  tariff_weekend_cheap:
    name: "Taryfa Dostawcy - Cheap w Weekend'y"
    initial: on
    icon: mdi:calendar-weekend

  tariff_holiday_cheap:
    name: "Taryfa Dostawcy - Cheap w Święta"
    initial: on
    icon: mdi:calendar-multiselect

automation:

  # ------------------------------------------------
  # SYNC TARYFY Z BAZY SQL → INPUT HELPERS
  # ------------------------------------------------
  - alias: Sync Supplier Tariff Helpers
    id: ems_sync_tariff_from_sql
    mode: single

    trigger:
      - platform: homeassistant
        event: start
      - platform: time_pattern
        hours: "/1"
      - platform: state
        entity_id: sensor.tariff_supplier

    action:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ states('sensor.tariff_supplier') not in ['unknown', 'unavailable', ''] }}"
            sequence:
              # Ceny
              - service: input_number.set_value
                target:
                  entity_id: input_number.tariff_cheap_price
                data:
                  value: "{{ state_attr('sensor.tariff_supplier', 'cheap_price') | float(0.50) }}"

              - service: input_number.set_value
                target:
                  entity_id: input_number.tariff_normal_price
                data:
                  value: "{{ state_attr('sensor.tariff_supplier', 'normal_price') | float(0.80) }}"

              - service: input_number.set_value
                target:
                  entity_id: input_number.tariff_peak_price
                data:
                  value: "{{ state_attr('sensor.tariff_supplier', 'peak_price') | float(1.20) }}"

              # Godziny
              - service: input_number.set_value
                target:
                  entity_id: input_number.tariff_normal_start_hour
                data:
                  value: "{{ state_attr('sensor.tariff_supplier', 'normal_start_hour') | int(7) }}"

              - service: input_number.set_value
                target:
                  entity_id: input_number.tariff_normal_end_hour
                data:
                  value: "{{ state_attr('sensor.tariff_supplier', 'normal_end_hour') | int(13) }}"

              - service: input_number.set_value
                target:
                  entity_id: input_number.tariff_peak_start_hour
                data:
                  value: "{{ state_attr('sensor.tariff_supplier', 'peak_start_hour') | int(16) }}"

              - service: input_number.set_value
                target:
                  entity_id: input_number.tariff_peak_end_hour
                data:
                  value: "{{ state_attr('sensor.tariff_supplier', 'peak_end_hour') | int(21) }}"

              # Flagi weekend / święta
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ state_attr('sensor.tariff_supplier', 'weekend_cheap') | int(0) == 1 }}"
                    sequence:
                      - service: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.tariff_weekend_cheap
                    default:
                      - service: input_boolean.turn_off
                        target:
                          entity_id: input_boolean.tariff_weekend_cheap

              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ state_attr('sensor.tariff_supplier', 'holiday_cheap') | int(0) == 1 }}"
                    sequence:
                      - service: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.tariff_holiday_cheap
                    default:
                      - service: input_boolean.turn_off
                        target:
                          entity_id: input_boolean.tariff_holiday_cheap

  # ------------------------------------------------
  # UPDATE EXPORT PRICE EVERY QUARTER
  # ------------------------------------------------
  - alias: Update export price every quarter

    trigger:
      - platform: time_pattern
        minutes: "/15"

    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.energy_export_price
        data:
          value: "{{ states('sensor.rce_current_quarter_price') | float(0) }}"
