input_number:

  foxess_ems_min_soc:
    name: FoxESS EMS Min SOC
    min: 5
    max: 50
    step: 1
    unit_of_measurement: "%"
    initial: 20

  foxess_ems_fd_soc:
    name: FoxESS EMS Force Discharge SOC
    min: 5
    max: 50
    step: 1
    unit_of_measurement: "%"
    initial: 20

  foxess_ems_fd_power:
    name: FoxESS EMS Force Discharge Power
    min: 0
    max: 10000
    step: 100
    unit_of_measurement: W
    initial: 0

  energy_export_price:
    name: Energy Export Price
    min: 0
    max: 2
    step: 0.01
    unit_of_measurement: PLN/kWh
    initial: 0.40

  arbitrage_threshold:
    name: Arbitrage Threshold
    min: 0
    max: 1
    step: 0.01
    unit_of_measurement: PLN/kWh
    initial: 0.25

  battery_capacity_kwh:
    name: Battery Capacity
    min: 1
    max: 50
    step: 0.5
    unit_of_measurement: kWh
    initial: 10

  pv_forecast_today:
    name: PV Forecast Today
    min: 0
    max: 100
    step: 0.1
    unit_of_measurement: kWh
    initial: 10

  load_forecast_today:
    name: Load Forecast Today
    min: 0
    max: 100
    step: 0.1
    unit_of_measurement: kWh
    initial: 12


input_text:

  foxess_last_signature:
    name: FoxESS Last Signature


input_datetime:

  ems_last_mode_change:
    name: EMS Last Mode Change
    has_date: true
    has_time: true


input_select:

  ems_control_mode:
    name: EMS Control Mode
    options:

      - auto
      - force_charge
      - force_discharge
      - force_export
      - maintenance

    initial: auto
