template:

  - sensor:

# ------------------------------------------------
# PV FORECAST ENERGY TODAY (TERAZ ADAPTIVE!)
# ------------------------------------------------

      - name: EMS PV Forecast Energy Today
        unique_id: ems_pv_forecast_today
        unit_of_measurement: kWh
        icon: mdi:solar-power

        state: >
          {{ states('sensor.ems_adaptive_pv_forecast') | float(0) }}


# ------------------------------------------------
# LOAD FORECAST TODAY (TERAZ ADAPTIVE!)
# ------------------------------------------------

      - name: EMS Load Forecast Today
        unique_id: ems_load_forecast_today
        unit_of_measurement: kWh
        icon: mdi:home-lightning-bolt

        state: >
          {{ states('sensor.ems_adaptive_load_forecast') | float(0) }}


# ------------------------------------------------
# ENERGY BALANCE FORECAST
# ------------------------------------------------

      - name: EMS Energy Balance Forecast
        unique_id: ems_energy_balance_forecast
        unit_of_measurement: kWh
        icon: mdi:chart-bar

        state: >

          {% set pv = states('sensor.ems_pv_forecast_energy_today') | float(0) %}
          {% set load = states('sensor.ems_load_forecast_today') | float(0) %}

          {{ (pv - load) | round(2) }}


# ------------------------------------------------
# TARGET BATTERY SOC
# ------------------------------------------------

      - name: EMS Target Battery SOC
        unique_id: ems_target_battery_soc
        unit_of_measurement: "%"
        icon: mdi:battery-clock

        state: >

          {% set balance = states('sensor.ems_energy_balance_forecast') | float(0) %}

          {% if balance > 10 %}
            100
          {% elif balance > 5 %}
            90
          {% elif balance > 0 %}
            75
          {% else %}
            50
          {% endif %}

# ------------------------------------------------
# TOMORROW OUTLOOK (używany w strategii)
# ------------------------------------------------

      - name: EMS Tomorrow Outlook
        unique_id: ems_tomorrow_outlook
        icon: mdi:clock-future

        state: >
          {% set expensive = states('sensor.rce_expensive_hours_tomorrow') | default('') %}
          {% set count = expensive.split(',')|length if expensive else 0 %}
          {% if count >= 2 %}
            very_high
          {% else %}
            normal
          {% endif %}

# ------------------------------------------------
# DYNAMIC MAX SOC (zależny od trybu i taryfy)
# ------------------------------------------------
      - name: EMS Dynamic Max SOC
        unique_id: ems_dynamic_max_soc
        unit_of_measurement: "%"
        icon: mdi:battery-sync
        state: >
          {% set strategy = states('sensor.ems_energy_strategy') %}
          {% set tariff = states('sensor.energy_tariff_supplier') %}
          {% set arbitrage = states('sensor.ems_arbitrage_action') %}
          {% set override = states('sensor.ems_override_strategy') %}
          {% set tomorrow = states('sensor.ems_tomorrow_outlook') | default('normal') %}
          {% set limit = states('input_number.foxess_ems_max_soc') | int(98) %}

          {% if override == 'force_charge' or strategy == 'charge' or arbitrage == 'charge' or (tariff == 'cheap' and tomorrow == 'very_high') %}
            {{ [100, limit] | min }}
          {% elif strategy in ['discharge', 'export'] or override in ['force_discharge', 'force_export'] or tariff == 'peak' %}
            {{ [60, limit] | min }}
          {% else %}
            {{ [95, limit] | min }}
          {% endif %}
