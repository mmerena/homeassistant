template:

  - sensor:

# ------------------------------------------------
# ENERGY TARIFF G13
# ------------------------------------------------

      - name: Energy Tariff G13
        unique_id: energy_tariff_g13
        icon: mdi:clock

        state: >

          {% set hour = now().hour %}
          {% set weekday = now().weekday() %}

# WEEKEND

          {% if weekday in [5,6] %}
            cheap

# NIGHT

          {% elif hour < 7 %}
            cheap

# MORNING

          {% elif hour < 13 %}
            normal

# MIDDAY

          {% elif hour < 16 %}
            cheap

# EVENING PEAK

          {% elif hour < 21 %}
            peak

# NIGHT

          {% else %}
            cheap
          {% endif %}
