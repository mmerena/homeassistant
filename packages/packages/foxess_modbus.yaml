modbus:

  - name: foxess_modbus
    type: tcp
    host: 192.168.1.100
    port: 502

    timeout: 5
    retries: 3
    delay: 0
    message_wait_milliseconds: 30

    sensors:

# ------------------------------------------------
# PV PRODUCTION
# ------------------------------------------------

      - name: FoxESS PV Total Power
        unique_id: foxess_pv_total_power
        slave: 247
        address: 39118
        input_type: holding
        data_type: int32
        unit_of_measurement: kW
        scale: 0.001
        scan_interval: 10

# ------------------------------------------------
# GRID POWER
# ------------------------------------------------

      - name: FoxESS Grid Power
        unique_id: foxess_grid_power
        slave: 247
        address: 39168
        input_type: holding
        data_type: int32
        unit_of_measurement: W
        scan_interval: 10

# ------------------------------------------------
# LOAD POWER
# ------------------------------------------------

      - name: FoxESS Load Power
        unique_id: foxess_load_power
        slave: 247
        address: 39225
        input_type: holding
        data_type: int32
        unit_of_measurement: W
        scan_interval: 10

# ------------------------------------------------
# BATTERY POWER
# ------------------------------------------------

      - name: FoxESS Battery Power
        unique_id: foxess_battery_power
        slave: 247
        address: 39162
        input_type: holding
        data_type: int32
        unit_of_measurement: W
        scan_interval: 10

# ------------------------------------------------
# BATTERY SOC
# ------------------------------------------------

      - name: FoxESS Battery SOC
        unique_id: foxess_battery_soc
        slave: 247
        address: 39423
        input_type: holding
        data_type: uint16
        unit_of_measurement: "%"
        scan_interval: 30
