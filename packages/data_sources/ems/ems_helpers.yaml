input_boolean:

  tariff_weekend_cheap:
    name: Taryfa Dostawcy - Cheap w Weekend'y
    initial: on
    icon: mdi:calendar-weekend

  tariff_holiday_cheap:
    name: Taryfa Dostawcy - Cheap w Święta
    initial: on
    icon: mdi:calendar-multiselect

automation:

  # ------------------------------------------------
  # SYNC TARYFY Z BAZY SQL → INPUT HELPERS
  # ------------------------------------------------

  - alias: Sync Supplier Tariff Helpers
    id: ems_sync_tariff_from_sql
    mode: single

    trigger:
      - platform: homeassistant
        event: start
      - platform: time_pattern
        hours: "/1"
      - platform: state
        entity_id: sensor.local_supplier_tariff

    action:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ states('sensor.local_supplier_tariff') not in ['unknown', 'unavailable', ''] }}"
            sequence:
              # Ceny
              - service: input_number.set_value
                target:
                  entity_id: input_number.tariff_cheap_price
                data:
                  value: "{{ state_attr('sensor.local_supplier_tariff', 'cheap_price') | float(0.50) }}"

              - service: input_number.set_value
                target:
                  entity_id: input_number.tariff_normal_price
                data:
                  value: "{{ state_attr('sensor.local_supplier_tariff', 'normal_price') | float(0.80) }}"

              - service: input_number.set_value
                target:
                  entity_id: input_number.tariff_peak_price
                data:
                  value: "{{ state_attr('sensor.local_supplier_tariff', 'peak_price') | float(1.20) }}"

              # Godziny
              - service: input_number.set_value
                target:
                  entity_id: input_number.tariff_normal_start_hour
                data:
                  value: "{{ state_attr('sensor.local_supplier_tariff', 'normal_start_hour') | int(7) }}"

              - service: input_number.set_value
                target:
                  entity_id: input_number.tariff_normal_end_hour
                data:
                  value: "{{ state_attr('sensor.local_supplier_tariff', 'normal_end_hour') | int(13) }}"

              - service: input_number.set_value
                target:
                  entity_id: input_number.tariff_peak_start_hour
                data:
                  value: "{{ state_attr('sensor.local_supplier_tariff', 'peak_start_hour') | int(16) }}"

              - service: input_number.set_value
                target:
                  entity_id: input_number.tariff_peak_end_hour
                data:
                  value: "{{ state_attr('sensor.local_supplier_tariff', 'peak_end_hour') | int(21) }}"

              # Flagi weekend / święta
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ state_attr('sensor.local_supplier_tariff', 'weekend_cheap') | int(0) == 1 }}"
                    sequence:
                      - service: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.tariff_weekend_cheap
                    default:
                      - service: input_boolean.turn_off
                        target:
                          entity_id: input_boolean.tariff_weekend_cheap

              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ state_attr('sensor.local_supplier_tariff', 'holiday_cheap') | int(0) == 1 }}"
                    sequence:
                      - service: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.tariff_holiday_cheap
                    default:
                      - service: input_boolean.turn_off
                        target:
                          entity_id: input_boolean.tariff_holiday_cheap

  # ------------------------------------------------
  # NOWOŚĆ: UPDATE PV FORECAST FROM FORECAST.SOLAR
  # ------------------------------------------------

  - alias: Update PV Forecast from Forecast.Solar
    id: ems_update_pv_forecast
    mode: single
    trigger:
      - platform: time_pattern
        minutes: "/5"
    condition:
      - condition: numeric_state
        entity_id: sensor.forecast_solar_energy_production_today  {# Zakładam nazwę sensora z integracji #}
        above: 0
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.pv_forecast_today
        data:
          value: "{{ states('sensor.forecast_solar_energy_production_today') | float(0) }}"

  # ------------------------------------------------
  # SYNC EXPORT QUARTER PRICE
  # ------------------------------------------------

  - alias: Sync Export Quarter Price
    id: ems_sync_export_quarter_price
    mode: single

    trigger:
      - platform: time_pattern
        minutes: "/15"

    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.energy_export_price
        data:
          value: "{{ states('sensor.rce_current_quarter_price') | float(0) }}"
