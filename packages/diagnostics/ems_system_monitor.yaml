template:

  - sensor:

# ------------------------------------------------
# EMS SYSTEM STATUS
# ------------------------------------------------

      - name: EMS System Status
        unique_id: ems_system_status
        icon: mdi:power

        state: >
          {% set strategy = states('sensor.ems_energy_strategy') %}

          {% if strategy in ['charge','export','self_use','discharge'] %}
            running
          {% else %}
            idle
          {% endif %}


# ------------------------------------------------
# EMS CURRENT STRATEGY
# ------------------------------------------------

      - name: EMS Current Strategy
        unique_id: ems_current_strategy
        icon: mdi:brain

        state: >
          {{ states('sensor.ems_energy_strategy') }}


# ------------------------------------------------
# EMS OPTIMIZER DECISION
# ------------------------------------------------

      - name: EMS Optimizer Decision
        unique_id: ems_optimizer_monitor
        icon: mdi:chart-line

        state: >
          {{ states('sensor.ems_optimizer_decision') }}


# ------------------------------------------------
# EMS PROFIT DECISION
# ------------------------------------------------

      - name: EMS Profit Decision
        unique_id: ems_profit_monitor
        icon: mdi:finance

        state: >
          {{ states('sensor.ems_profit_decision') }}


# ------------------------------------------------
# EMS ARBITRAGE STATUS
# ------------------------------------------------

      - name: EMS Arbitrage Status
        unique_id: ems_arbitrage_monitor
        icon: mdi:scale-balance

        state: >
          {{ states('sensor.ems_arbitrage_opportunity') }}


# ------------------------------------------------
# EMS BATTERY PLAN
# ------------------------------------------------

      - name: EMS Battery Plan
        unique_id: ems_battery_plan_monitor
        icon: mdi:battery-clock

        state: >
          {{ states('sensor.ems_planned_battery_soc') }}


# ------------------------------------------------
# EMS TARIFF (nowa nazwa)
# ------------------------------------------------

      - name: EMS Current Tariff
        unique_id: ems_tariff_monitor
        icon: mdi:clock

        state: >
          {{ states('sensor.energy_tariff_supplier') }}


# ------------------------------------------------
# EMS EXPORT PRICE
# ------------------------------------------------

      - name: EMS Export Price Monitor
        unique_id: ems_export_price_monitor
        unit_of_measurement: PLN/kWh
        icon: mdi:cash

        state: >
          {{ states('sensor.ems_export_price') | float(0) }}


# ------------------------------------------------
# EMS SUMMARY (z adaptive)
# ------------------------------------------------

      - name: EMS Summary
        unique_id: ems_summary
        icon: mdi:clipboard-text

        state: >

          {% set strategy = states('sensor.ems_energy_strategy') %}
          {% set optimizer = states('sensor.ems_optimizer_decision') %}
          {% set tariff = states('sensor.energy_tariff_supplier') %}
          {% set export = states('sensor.ems_export_price') | float(0) %}
          {% set soc = states('sensor.battery_soc') %}
          {% set adaptive_status = states('sensor.ems_adaptive_forecast_status') %}
          {% set pv_adapt = states('sensor.ems_adaptive_pv_forecast') | float(0) %}

          {{ strategy
             ~ " | optimizer:" ~ optimizer
             ~ " | tariff:" ~ tariff
             ~ " | export:" ~ export
             ~ " | soc:" ~ soc
             ~ " | adaptive:" ~ adaptive_status
             ~ " | PV:" ~ pv_adapt ~ "kWh" }}
