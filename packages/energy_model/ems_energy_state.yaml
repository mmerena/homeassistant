template:

  - sensor:

# ------------------------------------------------
# ENERGY STATE ENGINE
# ------------------------------------------------

      - name: EMS Energy State
        unique_id: ems_energy_state
        icon: mdi:lightning-bolt

        state: >

          {% set pv = states('sensor.pv_power') | float(0) %}
          {% set load = states('sensor.load_power') | float(0) %}
          {% set grid = states('sensor.grid_power') | float(0) %}
          {% set battery = states('sensor.battery_power') | float(0) %}

# PV CHARGING BATTERY

          {% if pv > load and battery > 100 %}
            pv_charge

# PV EXPORT

          {% elif pv > load and grid < -200 %}
            pv_export

# GRID IMPORT

          {% elif grid > 200 %}
            grid_import

# BATTERY SUPPORT

          {% elif battery < -200 %}
            battery_support

# BALANCED SYSTEM

          {% else %}
            balanced
          {% endif %}
