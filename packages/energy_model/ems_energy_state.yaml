template:

  - sensor:

# ------------------------------------------------
# ENERGY STATE ENGINE v2.1-fix
# ------------------------------------------------

      - name: EMS Energy State
        unique_id: ems_energy_state
        icon: mdi:lightning-bolt
        device_class: enum

        state: >
          {% set pv = states('sensor.ems_pv_power') | float(0) %}
          {% set load = states('sensor.ems_load_power') | float(0) %}
          {% set grid = states('sensor.ems_grid_power') | float(0) %}
          {% set battery = states('sensor.ems_battery_power') | float(0) %}

          {# pv_charge: PV ładuje baterię #}
          {% if pv > load and battery > 300 %}
            pv_charge

          {# pv_export: nadmiar PV idzie na sieć #}
          {% elif pv > load and grid < -300 %}
            pv_export

          {# grid_import: pobieramy z sieci #}
          {% elif grid > 300 %}
            grid_import

          {# battery_support: bateria wspiera dom #}
          {% elif battery < -300 %}
            battery_support

          {# balanced: wszystko w równowadze #}
          {% else %}
            balanced
          {% endif %}
