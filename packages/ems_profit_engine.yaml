template:

  - sensor:

# ------------------------------------------------
# IMPORT ENERGY PRICE
# ------------------------------------------------

      - name: EMS Import Price
        unique_id: ems_import_price
        unit_of_measurement: PLN/kWh
        icon: mdi:transmission-tower

        state: >

          {% set tariff = states('sensor.energy_tariff_g13') %}

          {% if tariff == 'peak' %}
            1.20

          {% elif tariff == 'normal' %}
            0.80

          {% else %}
            0.50
          {% endif %}


# ------------------------------------------------
# STORED ENERGY VALUE
# ------------------------------------------------

      - name: EMS Stored Energy Value
        unique_id: ems_stored_energy_value
        unit_of_measurement: PLN/kWh
        icon: mdi:battery

        state: >

          {% set import_price = states('sensor.ems_import_price') | float(0) %}
          {% set efficiency = 0.90 %}

          {{ (import_price * efficiency) | round(3) }}


# ------------------------------------------------
# PROFIT DECISION
# ------------------------------------------------

      - name: EMS Profit Decision
        unique_id: ems_profit_decision
        icon: mdi:finance

        state: >

          {% set export_price = states('sensor.ems_export_price') | float(0) %}
          {% set stored_value = states('sensor.ems_stored_energy_value') | float(0) %}

          {% if export_price > stored_value %}
            sell
          {% else %}
            store
          {% endif %}
