template:

  - sensor:

# ------------------------------------------------
# DYNAMIC MAX SOC
# ------------------------------------------------

      - name: EMS Dynamic Max SOC
        unique_id: ems_dynamic_max_soc
        unit_of_measurement: "%"
        icon: mdi:battery-heart

        state: >

          {% set h = now().hour %}

# --- NIGHT RESERVE -------------------------------

          {% if h < 6 %}
            90

# --- MORNING BUFFER ------------------------------

          {% elif h < 10 %}
            70

# --- MIDDAY PV ----------------------------------

          {% elif h < 15 %}
            95

# --- AFTERNOON ----------------------------------

          {% elif h < 18 %}
            100

# --- EVENING PEAK -------------------------------

          {% elif h < 23 %}
            90

# --- LATE NIGHT --------------------------------

          {% else %}
            80
          {% endif %}
