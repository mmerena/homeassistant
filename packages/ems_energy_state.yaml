template:

  - sensor:

# ------------------------------------------------
# ENERGY STATE ENGINE
# ------------------------------------------------

      - name: EMS Energy State
        unique_id: ems_energy_state
        icon: mdi:transmission-tower

        state: >

          {% set pv = states('sensor.pv_power') | float(0) %}
          {% set load = states('sensor.load_power') | float(0) %}
          {% set grid = states('sensor.grid_power') | float(0) %}
          {% set battery = states('sensor.battery_power') | float(0) %}
          {% set soc = states('sensor.battery_soc') | float(0) %}

          {% set surplus = pv - load %}

          {% if pv < 50 and grid < -200 %}
            grid_import

          {% elif surplus > 500 and battery > 200 %}
            pv_charge

          {% elif surplus > 500 and grid > 200 %}
            pv_export

          {% elif battery < -200 %}
            battery_support

          {% elif grid > 200 %}
            grid_export

          {% else %}
            balanced
          {% endif %}
