template:

  - sensor:

# ------------------------------------------------
# IMPORT ENERGY PRICE
# ------------------------------------------------

      - name: EMS Import Price
        unique_id: ems_import_price
        unit_of_measurement: PLN/kWh
        icon: mdi:transmission-tower

        state: >

          {% set tariff = states('sensor.energy_tariff_supplier') %}
          
          {% if tariff == 'peak' %}

            {{ states('input_number.tariff_peak_price') | float(1.20) }}

          {% elif tariff == 'normal' %}

            {{ states('input_number.tariff_normal_price') | float(0.80) }}

          {% else %}

            {{ states('input_number.tariff_cheap_price') | float(0.50) }}

          {% endif %}


# ------------------------------------------------
# STORED ENERGY VALUE
# ------------------------------------------------

      - name: EMS Stored Energy Value
        unique_id: ems_stored_energy_value
        unit_of_measurement: PLN/kWh
        icon: mdi:battery

        state: >

          {% set import_price = states('sensor.ems_import_price') | float(0) %}
          {% set efficiency = 0.90 %}

          {{ (import_price * efficiency) | round(3) }}


# ------------------------------------------------
# PROFIT DECISION (NAPRAWIONY – KLUCZOWA POPRAWKA!)
# ------------------------------------------------

      - name: EMS Profit Decision
        unique_id: ems_profit_decision
        icon: mdi:finance

        state: >

          {% set export_price = states('sensor.ems_export_price') | float(0) %}
          {% set stored_value = states('sensor.ems_stored_energy_value') | float(0) %}
          {% set tariff = states('sensor.energy_tariff_supplier') %}   {# <-- DODANE – usuwa błąd #}

          {# Agresywniejsze progi – sprzedajemy szybciej przy RCE peak #}
          {% if export_price > (stored_value + 0.20 if tariff == 'peak' else stored_value + 0.05) %}
            sell
          {% else %}
            store
          {% endif %}


# ------------------------------------------------
# PROFIT SPREAD
# ------------------------------------------------

      - name: EMS Profit Spread
        unique_id: ems_profit_spread
        unit_of_measurement: "PLN/kWh"
        state: >
          {% set sell = states('sensor.ems_export_price') | float(0) %}
          {% set buy = states('sensor.ems_import_price') | float(0) %}
          {% set battery_cost = 0.08 %}
          {{ (sell - buy - battery_cost) | round(3) }}
