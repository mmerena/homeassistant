template:

  - sensor:

# ------------------------------------------------
# STRATEGY CANDIDATE
# ------------------------------------------------

      - name: EMS Strategy Candidate
        unique_id: ems_strategy_candidate
        icon: mdi:brain

        state: >

          {% set energy_state = states('sensor.ems_energy_state') %}
          {% set surplus = states('sensor.ems_pv_surplus_level') %}
          {% set battery = states('sensor.ems_battery_state') %}
          {% set tariff = states('sensor.energy_tariff_g13') %}
          {% set profit = states('sensor.ems_profit_decision') %}
          {% set soc = states('sensor.battery_soc') | float(0) %}

# PRIORITY 1 BATTERY PROTECTION

          {% if battery == 'critical' or soc < 15 %}
            charge

# PRIORITY 2 PROFIT SELL

          {% elif profit == 'sell' and battery != 'critical' %}
            export

# PRIORITY 3 CHEAP GRID ENERGY

          {% elif tariff == 'cheap' and soc < 90 %}
            charge

# PRIORITY 4 PV SURPLUS

          {% elif surplus in ['very_high','high','medium'] and battery != 'full' %}
            self_use

# PRIORITY 5 PV EXPORT

          {% elif energy_state == 'pv_export' %}
            export

# DEFAULT

          {% else %}
            self_use
          {% endif %}
