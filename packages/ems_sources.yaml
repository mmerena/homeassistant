template:

  - sensor:

# ------------------------------------------------
# PV POWER
# ------------------------------------------------

      - name: PV Power
        unique_id: ems_pv_power
        unit_of_measurement: W
        icon: mdi:solar-power

        state: >
          {{ states('sensor.foxess_pv_power') | float(0) }}


# ------------------------------------------------
# LOAD POWER
# ------------------------------------------------

      - name: Load Power
        unique_id: ems_load_power
        unit_of_measurement: W
        icon: mdi:home-lightning-bolt

        state: >
          {{ states('sensor.foxess_load_power') | float(0) }}


# ------------------------------------------------
# GRID POWER
# ------------------------------------------------

      - name: Grid Power
        unique_id: ems_grid_power
        unit_of_measurement: W
        icon: mdi:transmission-tower

        state: >
          {{ states('sensor.foxess_grid_power') | float(0) }}


# ------------------------------------------------
# BATTERY POWER
# ------------------------------------------------

      - name: Battery Power
        unique_id: ems_battery_power
        unit_of_measurement: W
        icon: mdi:battery

        state: >
          {{ states('sensor.foxess_battery_power') | float(0) }}


# ------------------------------------------------
# BATTERY SOC
# ------------------------------------------------

      - name: Battery SOC
        unique_id: ems_battery_soc
        unit_of_measurement: "%"
        icon: mdi:battery-high

        state: >
          {{ states('sensor.foxess_battery_soc') | float(0) }}
