template:

  - sensor:

# ------------------------------------------------
# EXPORT PRICE
# ------------------------------------------------

      - name: EMS Export Price
        unique_id: ems_export_price
        unit_of_measurement: PLN/kWh
        icon: mdi:cash

        state: >
          {{ states('input_number.energy_export_price') | float(0) }}


# ------------------------------------------------
# EXPORT PRICE LEVEL
# ------------------------------------------------

      - name: EMS Export Price Level
        unique_id: ems_export_price_level
        icon: mdi:finance

        state: >

          {% set price = states('sensor.ems_export_price') | float(0) %}

          {% if price > 1.00 %}
            very_high

          {% elif price > 0.70 %}
            high

          {% elif price > 0.40 %}
            medium

          {% elif price > 0.20 %}
            low

          {% else %}
            very_low
          {% endif %}
