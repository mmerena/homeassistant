template:

  - sensor:

# ------------------------------------------------
# EMS ENERGY STRATEGY
# ------------------------------------------------

      - name: EMS Energy Strategy
        unique_id: ems_energy_strategy
        icon: mdi:brain

        state: >

          {% set override = states('sensor.ems_override_strategy') %}
          {% set current_soc = states('sensor.battery_soc') | float(0) %}
          {% set target_soc = states('sensor.ems_target_battery_soc') | int(50) %}
          {% set planned_soc = states('sensor.ems_planned_battery_soc') | int(30) %}
          {% set surplus = states('sensor.ems_pv_surplus_level') %}
          {% set battery = states('sensor.ems_battery_state') %}
          {% set tariff = states('sensor.energy_tariff_supplier') %}
          {% set optimizer = states('sensor.ems_optimizer_decision') %}
          {% set energy_state = states('sensor.ems_energy_state') %}

# ------------------------------------------------
# MANUAL OVERRIDE
# ------------------------------------------------

          {% if override not in ['auto','idle'] %}
            {{ override }}

# ------------------------------------------------
# MAINTENANCE MODE
# ------------------------------------------------

          {% elif override == 'idle' %}
            self_use

# ------------------------------------------------
# AUTO MODE
# ------------------------------------------------

          {% else %}

# 1. BATTERY PROTECTION
            {% if battery == 'critical' or current_soc < 15 %}
              charge

# 2. PEAK – AGRESYWNY DISCHARGE
            {% elif tariff == 'peak' and current_soc > 40 %}
              discharge

# 3. PROGNOZA – CEL SOC
            {% elif current_soc < target_soc and tariff in ['cheap', 'normal'] %}
              charge

# 4. OPTIMIZER SELL
            {% elif optimizer == 'sell' %}
              export

# 5. GRID ARBITRAGE
            {% elif optimizer == 'arbitrage' %}
              charge

# 6. CHEAP TARIFF CHARGE
            {% elif tariff == 'cheap' and current_soc < 90 %}
              charge

# 7. PROGNOZA – NADMIAR
            {% elif current_soc > (planned_soc + 20) and surplus in ['very_high', 'high'] %}
              export

# 8. PV SURPLUS
            {% elif surplus in ['very_high','high','medium'] and battery != 'full' %}
              self_use

# 9. PV EXPORT
            {% elif energy_state == 'pv_export' %}
              export

# DEFAULT
            {% else %}
              self_use
            {% endif %}

          {% endif %}


# ------------------------------------------------
# FOXESS MODE MAPPING
# ------------------------------------------------

      - name: EMS FoxESS Mode
        unique_id: ems_foxess_mode
        icon: mdi:cog-transfer

        state: >

          {% set strategy = states('sensor.ems_energy_strategy') %}

          {% if strategy == 'charge' %}
            6
          {% elif strategy == 'discharge' %}
            7
          {% elif strategy == 'export' %}
            2
          {% else %}
            1
          {% endif %}
