modbus:

  - name: foxess_modbus
    type: tcp
    host: 192.168.1.100
    port: 502
    timeout: 5
    retries: 3
    delay: 0
    message_wait_milliseconds: 30

    sensors:

# ------------------------------------------------
# PV PRODUCTION
# ------------------------------------------------

      - name: FoxESS PV Total Power
        unique_id: foxess_pv_total_power
        slave: 247
        address: 39118
        input_type: holding
        data_type: int32
        unit_of_measurement: kW
        scale: 0.001
        scan_interval: 10

      - name: FoxESS PV1 Power
        unique_id: foxess_pv1_power
        slave: 247
        address: 39279
        input_type: holding
        data_type: int32
        unit_of_measurement: W
        scan_interval: 10

      - name: FoxESS PV2 Power
        unique_id: foxess_pv2_power
        slave: 247
        address: 39281
        input_type: holding
        data_type: int32
        unit_of_measurement: W
        scan_interval: 10

# ------------------------------------------------
# GRID
# ------------------------------------------------

      - name: FoxESS Grid Power
        unique_id: foxess_grid_power
        slave: 247
        address: 39168
        input_type: holding
        data_type: int32
        unit_of_measurement: W
        scan_interval: 10

# ------------------------------------------------
# HOUSE LOAD
# ------------------------------------------------

      - name: FoxESS Load Power
        unique_id: foxess_load_power
        slave: 247
        address: 39225
        input_type: holding
        data_type: int32
        unit_of_measurement: W
        scan_interval: 10

# ------------------------------------------------
# BATTERY
# ------------------------------------------------

      - name: FoxESS Battery Power
        unique_id: foxess_battery_power
        slave: 247
        address: 39162
        input_type: holding
        data_type: int32
        unit_of_measurement: W
        scan_interval: 10

      - name: FoxESS Battery Voltage
        unique_id: foxess_battery_voltage
        slave: 247
        address: 39227
        input_type: holding
        data_type: int16
        unit_of_measurement: V
        scale: 0.1
        scan_interval: 10

      - name: FoxESS Battery Current
        unique_id: foxess_battery_current
        slave: 247
        address: 39228
        input_type: holding
        data_type: int32
        unit_of_measurement: A
        scale: 0.001
        scan_interval: 10

      - name: FoxESS Battery SOC
        unique_id: foxess_battery_soc
        slave: 247
        address: 39423
        input_type: holding
        data_type: uint16
        unit_of_measurement: "%"
        scan_interval: 30

# ------------------------------------------------
# INVERTER OUTPUT
# ------------------------------------------------

      - name: FoxESS Inverter Power
        unique_id: foxess_inverter_power
        slave: 247
        address: 39134
        input_type: holding
        data_type: int32
        unit_of_measurement: kW
        scale: 0.001
        scan_interval: 10

# ------------------------------------------------
# GRID PARAMETERS
# ------------------------------------------------

      - name: FoxESS Grid Frequency
        unique_id: foxess_grid_frequency
        slave: 247
        address: 39139
        input_type: holding
        data_type: int16
        unit_of_measurement: Hz
        scale: 0.01
        scan_interval: 30

      - name: FoxESS Grid Voltage R
        unique_id: foxess_grid_voltage_r
        slave: 247
        address: 39123
        input_type: holding
        data_type: int16
        unit_of_measurement: V
        scale: 0.1
        scan_interval: 30

# ------------------------------------------------
# SYSTEM
# ------------------------------------------------

      - name: FoxESS Internal Temperature
        unique_id: foxess_internal_temp
        slave: 247
        address: 39141
        input_type: holding
        data_type: int16
        unit_of_measurement: °C
        scale: 0.1
        scan_interval: 30

# ------------------------------------------------
# ENERGY COUNTERS
# ------------------------------------------------

      - name: FoxESS PV Energy Today
        unique_id: foxess_pv_energy_today
        slave: 247
        address: 39151
        input_type: holding
        data_type: uint32
        unit_of_measurement: kWh
        scale: 0.01
        scan_interval: 60

      - name: FoxESS PV Energy Total
        unique_id: foxess_pv_energy_total
        slave: 247
        address: 39149
