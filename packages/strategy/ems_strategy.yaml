template:

  - sensor:

# ------------------------------------------------
# EMS TOMORROW SELL OPPORTUNITY (v2.1-fix – zabezpieczony przed float error)
# ------------------------------------------------

      - name: EMS Tomorrow Sell Opportunity
        unique_id: ems_tomorrow_sell_opportunity
        icon: mdi:clock-future

        state: >
          {# --- BEZPIECZNA WERSJA – zero ryzyka float #}
          {% set expensive_str = states('sensor.rce_expensive_hours_tomorrow') | default('') | string %}
          {% set count = expensive_str.split(',')|length if expensive_str | trim else 0 %}

          {# bezpieczne pobieranie cen jutro #}
          {% set attr = state_attr('sensor.rce_prices_tomorrow', 'hours') %}
          {% set price_data = attr | from_json if attr is string else {} %}
          {% set prices = price_data.values() | map('float') | list if price_data is mapping else [] %}
          {% set max_price = prices | max | default(0) %}

          {% if count >= 3 and max_price > 1.20 %}
            very_high
          {% elif count >= 2 and max_price > 0.90 %}
            high
          {% else %}
            normal
          {% endif %}

# ------------------------------------------------
# EMS ENERGY STRATEGY v2.1-fix
# ------------------------------------------------

      - name: EMS Energy Strategy
        unique_id: ems_energy_strategy
        icon: mdi:brain

        state: >

          {% set override = states('sensor.ems_override_strategy') %}
          {% set soc = states('sensor.battery_soc') | float(0) %}
          {% set target_soc = states('sensor.ems_target_battery_soc') | int(50) %}
          {% set tariff = states('sensor.energy_tariff_supplier') %}
          {% set profit = states('sensor.ems_profit_decision') %}
          {% set arbitrage = states('sensor.ems_arbitrage_action') %}
          {% set surplus = states('sensor.ems_pv_surplus_level') %}
          {% set tomorrow_sell = states('sensor.ems_tomorrow_sell_opportunity') | default('normal') %}

          {% if override not in ['auto','idle'] %}
            {{ override }}

          {% elif override == 'idle' %}
            self_use

          {% else %}
            {# 0. NAJWYŻSZY PRIORYTET: JUTRO RCE PEAK #}
            {% if tomorrow_sell == 'very_high' and soc < 85 %}
              charge
            {% elif tomorrow_sell == 'very_high' and soc > 40 %}
              export

            {# 1. TARYFA DOSTAWCY #}
            {% elif tariff == 'peak' and soc > 35 %}
              discharge

            {% elif tariff in ['cheap','normal'] and soc < target_soc %}
              charge

            {# 2. Profit + Arbitrage #}
            {% elif profit == 'sell' and soc > 30 %}
              export
            {% elif arbitrage == 'discharge' and soc > 35 %}
              discharge
            {% elif arbitrage == 'charge' and soc < 75 and tariff != 'peak' %}
              charge

            {# 3. Self-use #}
            {% elif surplus in ['very_high','high','medium'] and soc < 95 %}
              self_use
            {% else %}
              self_use
            {% endif %}
          {% endif %}

# ------------------------------------------------
# FOXESS MODE MAPPING
# ------------------------------------------------

      - name: EMS FoxESS Mode
        unique_id: ems_foxess_mode
        icon: mdi:cog-transfer

        state: >
          {% set strategy = states('sensor.ems_energy_strategy') %}

          {% if strategy == 'charge' %}
            6
          {% elif strategy == 'discharge' %}
            7
          {% elif strategy == 'export' %}
            2
          {% else %}
            1
          {% endif %}
