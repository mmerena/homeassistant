template:

  - sensor:

# ------------------------------------------------
# PV SURPLUS v2.1-fix
# ------------------------------------------------

      - name: EMS PV Surplus
        unique_id: ems_pv_surplus
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        icon: mdi:solar-power

        state: >
          {% set pv = states('sensor.ems_pv_power') | float(0) %}
          {% set load = states('sensor.ems_load_power') | float(0) %}

          {{ (pv - load) | round(0) }}


# ------------------------------------------------
# PV SURPLUS LEVEL
# ------------------------------------------------

      - name: EMS PV Surplus Level
        unique_id: ems_pv_surplus_level
        icon: mdi:solar-power-variant

        state: >
          {% set surplus = states('sensor.ems_pv_surplus') | float(0) %}

          {% if surplus > 6000 %}
            very_high
          {% elif surplus > 3000 %}
            high
          {% elif surplus > 1000 %}
            medium
          {% elif surplus > 200 %}
            low
          {% else %}
            none
          {% endif %}


# ------------------------------------------------
# BATTERY STATE
# ------------------------------------------------

      - name: EMS Battery State
        unique_id: ems_battery_state
        icon: mdi:battery

        state: >
          {% set soc = states('sensor.battery_soc') | float(0) %}

          {% if soc < 15 %}
            critical
          {% elif soc < 35 %}
            low
          {% elif soc < 75 %}
            normal
          {% else %}
            full
          {% endif %}


# ------------------------------------------------
# GRID STATE
# ------------------------------------------------

      - name: EMS Grid State
        unique_id: ems_grid_state
        icon: mdi:transmission-tower

        state: >
          {% set grid = states('sensor.ems_grid_power') | float(0) %}

          {% if grid > 300 %}
            import
          {% elif grid < -300 %}
            export
          {% else %}
            neutral
          {% endif %}


# ------------------------------------------------
# POWER BALANCE
# ------------------------------------------------

      - name: EMS Power Balance
        unique_id: ems_power_balance
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        icon: mdi:scale-balance

        state: >
          {% set pv = states('sensor.ems_pv_power') | float(0) %}
          {% set grid = states('sensor.ems_grid_power') | float(0) %}
          {% set battery = states('sensor.ems_battery_power') | float(0) %}
          {% set load = states('sensor.ems_load_power') | float(0) %}

          {{ (pv + grid + battery - load) | round(0) }}


# ------------------------------------------------
# EXPORT POTENTIAL v2.1-fix (NAPRAWIONY – bez | max(0))
# ------------------------------------------------

      - name: EMS Export Potential
        unique_id: ems_export_potential
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        icon: mdi:transmission-tower-export

        state: >
          {% set pv_surplus = states('sensor.ems_pv_surplus') | float(0) %}
          {% set battery_to_grid = states('sensor.ems_battery_to_grid') | default(0) | float(0) %}
          {% set total = pv_surplus + battery_to_grid %}

          {{ total if total > 0 else 0 | round(0) }}
