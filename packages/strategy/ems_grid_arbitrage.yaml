template:

  - sensor:

# ------------------------------------------------
# ARBITRAGE MARGIN
# ------------------------------------------------

      - name: EMS Arbitrage Margin
        unique_id: ems_arbitrage_margin
        unit_of_measurement: PLN/kWh
        icon: mdi:chart-line

        state: >

          {% set export_price = states('sensor.ems_export_price') | float(0) %}
          {% set import_price = states('sensor.ems_import_price') | float(0) %}
          {{ (export_price - import_price) | round(3) }}


# ------------------------------------------------
# ARBITRAGE OPPORTUNITY v2.1
# ------------------------------------------------

      - name: EMS Arbitrage Opportunity
        unique_id: ems_arbitrage_opportunity
        icon: mdi:scale-balance

        state: >

          {% set margin = states('sensor.ems_arbitrage_margin') | float(0) %}
          {% set threshold = states('input_number.arbitrage_threshold') | float(0.20) %}  {# <-- z helpers v2.1 #}

          {% if margin > threshold %}
            profitable
          {% else %}
            none
          {% endif %}


# ------------------------------------------------
# ARBITRAGE ACTION v2.1 (z jutrzejszym RCE!)
# ------------------------------------------------

      - name: EMS Arbitrage Action
        unique_id: ems_arbitrage_action
        state: >
          {% set spread = states('sensor.ems_profit_spread') | float(0) %}
          {% set soc = states('sensor.battery_soc') | float(50) %}
          {% set tomorrow = states('sensor.ems_tomorrow_sell_opportunity') | default('normal') %}

          {# NAJWYŻSZY PRIORYTET: jutro bardzo drogie RCE #}
          {% if tomorrow == 'very_high' and soc > 35 %}
            export
          {% elif tomorrow == 'very_high' and soc < 75 %}
            charge

          {% elif spread > 0.25 and soc > 35 %}
            export
          {% elif spread > 0.15 and soc > 30 %}
            discharge
          {% elif spread < -0.15 and soc < 85 %}
            charge
          {% else %}
            self_use
          {% endif %}
