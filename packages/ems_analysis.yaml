template:

  - sensor:

# ------------------------------------------------
# PV SURPLUS
# ------------------------------------------------

      - name: EMS PV Surplus
        unique_id: ems_pv_surplus
        unit_of_measurement: W
        icon: mdi:solar-power

        state: >

          {% set pv = states('sensor.pv_power') | float(0) %}
          {% set load = states('sensor.load_power') | float(0) %}

          {{ (pv - load) | round(0) }}


# ------------------------------------------------
# PV SURPLUS LEVEL
# ------------------------------------------------

      - name: EMS PV Surplus Level
        unique_id: ems_pv_surplus_level
        icon: mdi:solar-power-variant

        state: >

          {% set surplus = states('sensor.ems_pv_surplus') | float(0) %}

          {% if surplus > 4000 %}
            very_high
          {% elif surplus > 2000 %}
            high
          {% elif surplus > 500 %}
            medium
          {% elif surplus > 100 %}
            low
          {% else %}
            none
          {% endif %}


# ------------------------------------------------
# BATTERY STATE
# ------------------------------------------------

      - name: EMS Battery State
        unique_id: ems_battery_state
        icon: mdi:battery

        state: >

          {% set soc = states('sensor.battery_soc') | float(0) %}

          {% if soc < 15 %}
            critical
          {% elif soc < 40 %}
            low
          {% elif soc < 80 %}
            normal
          {% else %}
            full
          {% endif %}


# ------------------------------------------------
# GRID STATE
# ------------------------------------------------

      - name: EMS Grid State
        unique_id: ems_grid_state
        icon: mdi:transmission-tower

        state: >

          {% set grid = states('sensor.grid_power') | float(0) %}

          {% if grid > 200 %}
            import
          {% elif grid < -200 %}
            export
          {% else %}
            neutral
          {% endif %}


# ------------------------------------------------
# POWER BALANCE
# ------------------------------------------------

      - name: EMS Power Balance
        unique_id: ems_power_balance
        unit_of_measurement: W
        icon: mdi:scale-balance

        state: >

          {% set pv = states('sensor.pv_power') | float(0) %}
          {% set grid = states('sensor.grid_power') | float(0) %}
          {% set battery = states('sensor.battery_power') | float(0) %}
          {% set load = states('sensor.load_power') | float(0) %}

          {{ (pv + grid + battery - load) | round(0) }}
