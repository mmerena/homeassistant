template:

  - sensor:

# ------------------------------------------------
# PV SURPLUS (PV - LOAD)
# ------------------------------------------------

      - name: EMS PV Surplus
        unique_id: ems_pv_surplus
        unit_of_measurement: W
        icon: mdi:solar-power
        state: >

          {% set pv = states('sensor.pv_power') | float(0) %}
          {% set load = states('sensor.load_power') | float(0) %}

          {{ (pv - load) | round(0) }}

# ------------------------------------------------
# PV SURPLUS LEVEL
# ------------------------------------------------

      - name: EMS PV Surplus Level
        unique_id: ems_pv_surplus_level
        icon: mdi:solar-power-variant
        state: >

          {% set s = states('sensor.ems_pv_surplus') | float(0) %}

          {% if s > 4000 %}
            very_high
          {% elif s > 2000 %}
            high
          {% elif s > 800 %}
            medium
          {% elif s > 200 %}
            low
          {% else %}
            none
          {% endif %}

# ------------------------------------------------
# BATTERY STATE
# ------------------------------------------------

      - name: EMS Battery State
        unique_id: ems_battery_state
        icon: mdi:battery
        state: >

          {% set soc = states('sensor.battery_soc') | float(0) %}

          {% if soc < 15 %}
            critical
          {% elif soc < 30 %}
            low
          {% elif soc > 95 %}
            full
          {% else %}
            normal
          {% endif %}

# ------------------------------------------------
# GRID STATE
# ------------------------------------------------

      - name: EMS Grid State
        unique_id: ems_grid_state
        icon: mdi:transmission-tower
        state: >

          {% set g = states('sensor.grid_power') | float(0) %}

          {% if g > 300 %}
            export
          {% elif g < -300 %}
            import
          {% else %}
            neutral
          {% endif %}

# ------------------------------------------------
# POWER BALANCE (diagnostic)
# ------------------------------------------------

      - name: EMS Power Balance
        unique_id: ems_power_balance
        unit_of_measurement: W
        icon: mdi:scale-balance

        state: >

          {% set pv = states('sensor.pv_power') | float(0) %}
          {% set grid = states('sensor.grid_power') | float(0) %}
          {% set battery = states('sensor.battery_power') | float(0) %}
          {% set load = states('sensor.load_power') | float(0) %}

          {{ (pv + grid + battery - load) | round(0) }}
