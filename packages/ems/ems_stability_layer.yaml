template:

  - sensor:

# ------------------------------------------------
# STRATEGY CHANGE REQUEST
# ------------------------------------------------

      - name: EMS Strategy Change Request
        unique_id: ems_strategy_change_request
        icon: mdi:swap-horizontal

        state: >

          {% set optimizer = states('sensor.ems_optimizer_decision') %}

          {% if optimizer == 'sell' %}
            export
          {% elif optimizer == 'charge' %}
            charge
          {% elif optimizer == 'arbitrage' %}
            charge
          {% else %}
            self_use
          {% endif %}


# ------------------------------------------------
# STRATEGY HYSTERESIS
# ------------------------------------------------

      - name: EMS Strategy Hysteresis
        unique_id: ems_strategy_hysteresis
        icon: mdi:chart-bell-curve

        state: >

          {% set request = states('sensor.ems_strategy_change_request') %}
          {% set current = states('sensor.ems_energy_strategy') %}

          {% if request == current %}
            stable
          {% else %}
            change_requested
          {% endif %}


# ------------------------------------------------
# STRATEGY STABILITY SCORE v2.1 (lepszy zakres 0-5)
# ------------------------------------------------

      - name: EMS Strategy Stability Score
        unique_id: ems_strategy_stability_score
        icon: mdi:scale-balance

        state: >

          {% set hysteresis = states('sensor.ems_strategy_hysteresis') %}
          {% set soc_delta = (states('sensor.battery_soc') | float(0) - states('sensor.ems_planned_battery_soc') | float(0)) | abs %}

          {% if hysteresis == 'stable' and soc_delta < 8 %}
            5
          {% elif hysteresis == 'stable' %}
            4
          {% elif soc_delta < 8 %}
            3
          {% else %}
            1
          {% endif %}


automation:

# ------------------------------------------------
# STRATEGY COOLDOWN v2.1 (30 min + inteligentne skracanie)
# ------------------------------------------------

  - alias: EMS Strategy Stability Control
    id: ems_strategy_stability_control

    trigger:
      - platform: state
        entity_id: sensor.ems_strategy_change_request

    condition:

      - condition: template
        value_template: >

          {% set last = states('input_datetime.ems_last_mode_change') %}
          {% set tomorrow = states('sensor.ems_tomorrow_sell_opportunity') | default('normal') %}
          {% set soc_delta = (states('sensor.battery_soc') | float(0) - states('sensor.ems_planned_battery_soc') | float(0)) | abs %}

          {# Skracamy cooldown przy bardzo ważnej zmianie na jutro #}
          {% set cooldown_seconds = 600 if tomorrow == 'very_high' else 1800 %}

          {% if last in ['unknown','unavailable',''] %}
            true
          {% else %}
            {{ (as_timestamp(now()) - as_timestamp(last)) > cooldown_seconds and soc_delta >= 8 }}
          {% endif %}

    action:

      - service: input_datetime.set_datetime
        data:
          entity_id: input_datetime.ems_last_mode_change
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

      - service: system_log.write
        data:
          level: info
          message: "EMS Strategy changed after cooldown | tomorrow={{ states('sensor.ems_tomorrow_sell_opportunity') }} | delta_soc={{ (states('sensor.battery_soc')|float - states('sensor.ems_planned_battery_soc')|float)|round(1) }}%"
