template:

  - sensor:

# ------------------------------------------------
# PV FORECAST ENERGY TODAY (TERAZ ADAPTIVE!)
# ------------------------------------------------

      - name: EMS PV Forecast Energy Today
        unique_id: ems_pv_forecast_today
        unit_of_measurement: kWh
        icon: mdi:solar-power

        state: >
          {{ states('sensor.ems_adaptive_pv_forecast') | default('0') | float(0) }}


# ------------------------------------------------
# LOAD FORECAST TODAY (TERAZ ADAPTIVE!)
# ------------------------------------------------

      - name: EMS Load Forecast Today
        unique_id: ems_load_forecast_today
        unit_of_measurement: kWh
        icon: mdi:home-lightning-bolt

        state: >
          {{ states('sensor.ems_adaptive_load_forecast') | default('0') | float(0) }}


# ------------------------------------------------
# ENERGY BALANCE FORECAST
# ------------------------------------------------

      - name: EMS Energy Balance Forecast
        unique_id: ems_energy_balance_forecast
        unit_of_measurement: kWh
        icon: mdi:chart-bar

        state: >

          {% set pv = states('sensor.ems_pv_forecast_energy_today') | default('0') | float(0) %}
          {% set load = states('sensor.ems_load_forecast_today') | default('0') | float(0) %}

          {{ (pv - load) | round(2) }}


# ------------------------------------------------
# TARGET BATTERY SOC
# ------------------------------------------------

      - name: EMS Target Battery SOC
        unique_id: ems_target_battery_soc
        unit_of_measurement: "%"
        icon: mdi:battery-clock

        state: >

          {% set balance = states('sensor.ems_energy_balance_forecast') | default('0') | float(0) %}

          {% if balance > 10 %}
            100
          {% elif balance > 5 %}
            90
          {% elif balance > 0 %}
            75
          {% else %}
            50
          {% endif %}


# ------------------------------------------------
# DYNAMIC MAX SOC (POPRAWIONA LOGIKA – NAJWAŻNIEJSZA ZMIANA!)
# ------------------------------------------------

      - name: EMS Dynamic Max SOC
        unique_id: ems_dynamic_max_soc
        unit_of_measurement: "%"
        state: >
          {% set spread = states('sensor.ems_profit_spread') | default('0') | float(0) %}
          {% set tomorrow_sell = states('sensor.ems_tomorrow_sell_opportunity') | default('normal') %}
          {% set limit = states('input_number.foxess_ems_max_soc') | int(98) %}

          {% if tomorrow_sell == 'very_high' or spread > 0.25 %}
            {{ [95, limit] | min }}

          {% elif spread > 0.15 or tomorrow_sell == 'high' %}
            {{ [85, limit] | min }}

          {% elif spread < -0.15 %}
            {{ [50, limit] | min }}

          {% else %}
            {{ [75, limit] | min }}
          {% endif %}
