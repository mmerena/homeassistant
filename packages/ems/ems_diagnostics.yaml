template:

  - sensor:

# ------------------------------------------------
# EMS SENSOR HEALTH
# ------------------------------------------------

      - name: EMS Sensor Health
        unique_id: ems_sensor_health
        icon: mdi:heart-pulse

        state: >
          {% set pv = states('sensor.ems_pv_power') %}
          {% set load = states('sensor.ems_load_power') %}
          {% set soc = states('sensor.ems_battery_soc') %}
          {% set grid = states('sensor.ems_grid_power') %}

          {% if pv in ['unknown','unavailable']
                or load in ['unknown','unavailable']
                or soc in ['unknown','unavailable']
                or grid in ['unknown','unavailable'] %}
            error
          {% else %}
            ok
          {% endif %}


# ------------------------------------------------
# EMS ENERGY BALANCE CHECK
# ------------------------------------------------

      - name: EMS Energy Balance Check
        unique_id: ems_energy_balance_check
        icon: mdi:scale-balance

        state: >
          {% set pv = states('sensor.ems_pv_power') | default('0') | float(0) %}
          {% set load = states('sensor.ems_load_power') | default('0') | float(0) %}
          {% set grid = states('sensor.ems_grid_power') | default('0') | float(0) %}
          {% set battery = states('sensor.ems_battery_power') | default('0') | float(0) %}

          {% set balance = pv + grid + battery - load %}

          {% if balance | abs > 500 %}
            warning
          {% else %}
            ok
          {% endif %}


# ------------------------------------------------
# EMS STRATEGY STABILITY v2.1 (nowy scoring 0-5)
# ------------------------------------------------

      - name: EMS Strategy Stability
        unique_id: ems_strategy_stability
        icon: mdi:chart-timeline-variant

        state: >
          {% set score = states('sensor.ems_strategy_stability_score') | default('0') | float(0) %}

          {% if score >= 4 %}
            very_stable
          {% elif score >= 3 %}
            stable
          {% elif score >= 2 %}
            moderate
          {% else %}
            unstable
          {% endif %}


# ------------------------------------------------
# EMS PROFITABILITY STATUS
# ------------------------------------------------

      - name: EMS Profitability Status
        unique_id: ems_profitability_status
        icon: mdi:finance

        state: >
          {% set profit = states('sensor.ems_profit_decision') | default('store') %}
          {% set spread = states('sensor.ems_profit_spread') | default('0') | float(0) %}

          {% if profit == 'sell' and spread > 0.15 %}
            profitable
          {% elif profit == 'sell' %}
            potentially_profitable
          {% else %}
            neutral
          {% endif %}


# ------------------------------------------------
# EMS ADAPTIVE FORECAST STATUS
# ------------------------------------------------

      - name: EMS Adaptive Forecast Status
        unique_id: ems_adaptive_forecast_status
        icon: mdi:chart-line-variant

        state: >
          {% set adaptive_pv = states('sensor.ems_adaptive_pv_forecast') | default('0') | float(0) %}
          {% set manual_pv = states('input_number.pv_forecast_today') | default('0') | float(0) %}
          {% set diff = ((adaptive_pv - manual_pv) / manual_pv * 100) if manual_pv > 0 else 0 %}

          {% if diff > 20 or diff < -20 %}
            learning
          {% elif adaptive_pv > 0 %}
            stable
          {% else %}
            not_ready
          {% endif %}


# ------------------------------------------------
# EMS SYSTEM HEALTH v2.1 (ulepszony – sprawdza WSZYSTKO)
# ------------------------------------------------

      - name: EMS System Health
        unique_id: ems_system_health
        icon: mdi:shield-check

        state: >
          {% set sensors = states('sensor.ems_sensor_health') | default('ok') %}
          {% set balance = states('sensor.ems_energy_balance_check') | default('ok') %}
          {% set stability = states('sensor.ems_strategy_stability') | default('stable') %}
          {% set adaptive = states('sensor.ems_adaptive_forecast_status') | default('stable') %}
          {% set tomorrow = states('sensor.ems_tomorrow_sell_opportunity') | default('normal') %}

          {% if sensors == 'ok'
                and balance == 'ok'
                and stability in ['very_stable','stable']
                and adaptive in ['stable','learning']
                and tomorrow != 'unknown' %}
            healthy

          {% elif sensors == 'error' %}
            sensor_error

          {% elif balance == 'warning' %}
            energy_mismatch

          {% elif stability == 'unstable' %}
            strategy_unstable

          {% else %}
            degraded
          {% endif %}

automation:

# ------------------------------------------------
# NOWOŚĆ: ALERT NA SYSTEM HEALTH DEGRADED
# ------------------------------------------------

  - alias: EMS Health Alert
    id: ems_health_alert
    trigger:
      - platform: state
        entity_id: sensor.ems_system_health
        to: 
          - 'sensor_error'
          - 'energy_mismatch'
          - 'strategy_unstable'
          - 'degraded'
    action:
      - service: notify.mobile_app_your_phone  {# Zmień na Twój notifier #}
        data:
          message: "EMS System Health: {{ states('sensor.ems_system_health') }} - Sprawdź diagnostykę!"
