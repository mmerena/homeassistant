template:

  - sensor:

      - name: EMS Override Strategy

        state: >

          {% set mode = states('input_select.ems_control_mode') %}

          {% if mode == 'force_charge' %}
            charge
          {% elif mode == 'force_discharge' %}
            discharge
          {% elif mode == 'force_export' %}
            export
          {% elif mode == 'maintenance' %}
            idle
          {% else %}
            auto
          {% endif %}
