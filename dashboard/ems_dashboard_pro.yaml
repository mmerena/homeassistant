      - type: entities
        title: EMS Status
        entities:

          - sensor.ems_energy_strategy
          - sensor.ems_system_mode
          - sensor.ems_foxess_mode

      - type: entities
        title: Energy Inputs
        entities:

          - sensor.pv_power
          - sensor.load_power
