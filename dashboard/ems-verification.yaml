title: EMS – Weryfikacja Jednostek & Decyzji
path: ems-verification
icon: mdi:shield-check
cards:

  - type: markdown
    content: |
      ## 🔥 EMS VERIFICATION DASHBOARD
  # ==================== 1. BATERIA & POJEMNOŚĆ (z BMS1 + BMS2) ====================
  - type: entities
    title: 1. Bateria & Pojemność (NAJWAŻNIEJSZE!)
    entities:
      - entity: sensor.ems_battery_capacity_real
        name: Pojemność rzeczywista z BMS (kWh)
      - entity: sensor.foxess_37635_bms1_design_energy
        name: BMS1 Design Energy RAW (Wh)
      - entity: sensor.foxess_38333_bms2_design_energy
        name: BMS2 Design Energy RAW (Wh)
      - entity: sensor.ems_battery_soc
        name: SOC BMS1 (%)
      - entity: sensor.ems_battery_soc_bms2
        name: SOC BMS2 (%)
      - entity: sensor.ems_battery_stored_energy
        name: Energia przechowywana (kWh)
      - entity: sensor.ems_planned_battery_soc
        name: Planowany SOC (%)
      - entity: sensor.ems_dynamic_max_soc
        name: Dynamic Max SOC (%)

  # ==================== 2. CENY & ARBITRAŻ ====================
  - type: entities
    title: 2. Ceny & Arbitraż RCE
    entities:
      - entity: sensor.ems_export_price
        name: Export Price RCE (PLN/kWh)
      - entity: sensor.ems_import_price
        name: Import Price (taryfa dostawcy)
      - entity: sensor.ems_profit_spread
        name: Profit Spread (PLN/kWh)
      - entity: sensor.ems_profit_decision
        name: Profit Decision
      - entity: sensor.ems_arbitrage_opportunity
        name: Arbitrage Opportunity
      - entity: sensor.ems_tomorrow_sell_opportunity
        name: Jutrzejsza okazja sprzedaży RCE

  # ==================== 3. MOC & PRZEPŁYWY (z BMS2) ====================
  - type: entities
    title: 3. Moc & Przepływy energii
    entities:
      - entity: sensor.ems_pv_power
        name: PV Power (kW)
      - entity: sensor.ems_battery_power
        name: Battery Power BMS1 (W)
      - entity: sensor.ems_battery_power_bms2
        name: Battery Power BMS2 (W)
      - entity: sensor.ems_grid_power
        name: Grid Power (W)
      - entity: sensor.ems_load_power
        name: Load Power (W)
      - entity: sensor.ems_energy_balance
        name: Energy Balance (W)
      - entity: sensor.ems_pv_surplus
        name: PV Surplus (W)

  # ==================== 4. DECYZJE STERUJĄCE ====================
  - type: entities
    title: 4. Decyzje sterujące
    entities:
      - entity: sensor.ems_energy_strategy
        name: EMS Energy Strategy
      - entity: sensor.ems_foxess_mode
        name: FoxESS Mode (1=self-use, 2=export, 6=charge, 7=discharge)
      - entity: sensor.ems_optimizer_decision
        name: Optimizer Decision
      - entity: sensor.ems_target_battery_soc
        name: Target Battery SOC (%)
      - entity: sensor.ems_battery_power_target
        name: Battery Power Target (W)
