- sensor:

    - name: FoxESS Status 3
      unique_id: foxess_status_3
      state: >
        {% set val = states('sensor.foxess_39065_status_3') | int(0) %}
        {% if val % 2 == 1 %}OFF-GRID{% else %}ON-GRID{% endif %}
      icon: >
        {% set val = states('sensor.foxess_39065_status_3') | int(0) %}
        {% if val % 2 == 1 %}mdi:transmission-tower-off{% else %}mdi:transmission-tower{% endif %}

    - name: FoxESS Remote Enable Bit
      unique_id: foxess_remote_enable_bit
      state: >
        {{ states('sensor.foxess_46001_remote_control_raw') | int(0) % 2 }}

- sensor:

    - name: FoxESS 46601-46619 Block
      unique_id: foxess_46601_46619_block
      state: >
        {% set raw = states('sensor.foxess_46601_46619_raw_block') %}
        {% if raw not in ['unknown','unavailable',''] %}
          ok
        {% else %}
          unavailable
        {% endif %}
      attributes:
        regs: >
          {% set raw = states('sensor.foxess_46601_46619_raw_block') %}
          {% if raw not in ['unknown','unavailable',''] %}
            {{ raw.split(',') | map('float') | map('int') | list }}
          {% else %}
            []
          {% endif %}

    - name: FoxESS Battery Maximum Charging Current
      state: >
        {{ state_attr('sensor.foxess_46601_46619_block','regs')[6] / 10 }}

    - name: FoxESS Battery Maximum Discharge Current
      state: >
        {{ state_attr('sensor.foxess_46601_46619_block','regs')[7] / 10 }}

    - name: FoxESS Minimum SoC
      unique_id: foxess_minimum_soc
      unit_of_measurement: "%"
      state: >
        {{ state_attr('sensor.foxess_46601_46619_block','regs')[8] }}
      icon: mdi:battery-low

    - name: FoxESS Maximum SoC
      unique_id: foxess_maximum_soc
      unit_of_measurement: "%"
      state: >
        {{ state_attr('sensor.foxess_46601_46619_block','regs')[9] }}
      icon: mdi:battery-high

    - name: FoxESS Minimum SoC OnGrid
      unique_id: foxess_minimum_soc_ongrid
      unit_of_measurement: "%"
      state: >
        {{ state_attr('sensor.foxess_46601_46619_block','regs')[10] }}
      icon: mdi:battery-medium

    - name: FoxESS EPS Frequency Select
      state: >
        {% set v = state_attr('sensor.foxess_46601_46619_block','regs')[11]|int %}
        {% if v == 1 %}50 Hz
        {% elif v == 2 %}60 Hz
        {% else %}Invalid
        {% endif %}

    - name: FoxESS EPS Output
      state: >
        {% set v = state_attr('sensor.foxess_46601_46619_block','regs')[12]|int %}
        {% if v == 2 %}EPS Mode
        {% elif v == 3 %}Ups Mode
        {% else %}Disable
        {% endif %}

    - name: FoxESS Balance Load
      state: >
        {{ state_attr('sensor.foxess_46601_46619_block','regs')[13]|int == 1 }}

    - name: FoxESS Balance Logic First
      state: >
        {{ state_attr('sensor.foxess_46601_46619_block','regs')[14]|int == 1 }}

    - name: FoxESS Export Power Limit 
      state: >
        {{ 256 * state_attr('sensor.foxess_46601_46619_block','regs')[15] + state_attr('sensor.foxess_46601_46619_block','regs')[16] }}

    - name: FoxESS Import Current Limit
      state: >
        {{ state_attr('sensor.foxess_46601_46619_block','regs')[17] / 10 }}

    - name: FoxESS Export Current Limit
      state: >
        {{ state_attr('sensor.foxess_46601_46619_block','regs')[18] / 10 }}

- sensor:

    - name: FoxESS Time Period Mode Flag
      unique_id: foxess_time_period_mode_flag_state
      state: >
        {% set raw = states('sensor.foxess_48000_48009_time_control_raw_block') %}
        {% if raw not in ['unknown','unavailable',''] %}
          {% set v = raw.split(',')[0] | float | int %}
          {{ 'Enabled' if v == 1 else 'Disabled' }}
        {% else %}
          unknown
        {% endif %}
      icon: mdi:calendar-clock

- sensor:

    - name: FoxESS Time Group 1 Block
      unique_id: foxess_time_group_1_block
      state: >
        {% set raw = states('sensor.foxess_48010_48019_time_control_raw_block') %}
        {% if raw not in ['unknown','unavailable',''] %}
          ok
        {% else %}
          unavailable
        {% endif %}
      attributes:
        regs: >
          {% set raw = states('sensor.foxess_48010_48019_time_control_raw_block') %}
          {% if raw not in ['unknown','unavailable',''] %}
            {{ raw.split(',') | map('float') | map('int') | list }}
          {% else %}
            []
          {% endif %}

    - name: FoxESS Time Group 1 Flag
      unique_id: foxess_time_group_1_flag_state
      state: >
        {% set r = state_attr('sensor.foxess_time_group_1_block','regs') %}
        {{ 'Enabled' if r and r[0] == 1 else 'Disabled' }}
      icon: mdi:toggle-switch

    - name: FoxESS Time Group 1 Start Time
      unique_id: foxess_time_group_1_start_time_state
      state: >
        {% set r = state_attr('sensor.foxess_time_group_1_block','regs') %}
        {% if r and r|length > 1 %}
          {% set v = r[1] %}
