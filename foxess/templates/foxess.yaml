    # 39601 – PV Total Energy (Wh)
    - name: FoxESS 39601 PV Total Energy
      unique_id: foxess_39601_pv_total_energy
      availability: >
        {{ states('sensor.foxess_39601_39631_raw_block') not in ['unknown', 'unavailable', ''] 
           and ',' in states('sensor.foxess_39601_39631_raw_block') }}
      state: >
