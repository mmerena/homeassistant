- sensor:

    - name: FoxESS Work Mode
      unique_id: foxess_work_mode
      state: >
        {% set v = states('sensor.foxess_49203_work_mode_raw') | int(-1) %}
        {% if v == 1 %}Self Use
        {% elif v == 2 %}Feed-in Priority
        {% elif v == 3 %}Backup
        {% elif v == 4 %}Peak Shaving
        {% else %}Unknown
        {% endif %}

    - name: FoxESS Work Mode Icon
      unique_id: foxess_work_mode_icon
      state: "{{ states('sensor.foxess_work_mode') }}"
      icon: >
        {% set v = states('sensor.foxess_49203_work_mode_raw') | int(0) %}
        {% if v == 1 %}mdi:home-lightning-bolt
        {% elif v == 2 %}mdi:transmission-tower-export
        {% elif v == 3 %}mdi:battery-lock
        {% elif v == 4 %}mdi:chart-bell-curve
        {% else %}mdi:help
        {% endif %}

- binary_sensor:

    - name: FoxESS Mode Self Use
      unique_id: foxess_mode_self_use
      state: "{{ states('sensor.foxess_49203_work_mode_raw') | int == 1 }}"

    - name: FoxESS Mode Feed In Priority
      unique_id: foxess_mode_feed_in
      state: "{{ states('sensor.foxess_49203_work_mode_raw') | int == 2 }}"

    - name: FoxESS Mode Backup
      unique_id: foxess_mode_backup
      state: "{{ states('sensor.foxess_49203_work_mode_raw') | int == 3 }}"

    - name: FoxESS Mode Peak Shaving
      unique_id: foxess_mode_peak_shaving
      state: "{{ states('sensor.foxess_49203_work_mode_raw') | int == 4 }}"

- select:

    - name: FoxESS Work Mode Select
      unique_id: foxess_work_mode_select

      state: >
        {% set m = states('sensor.foxess_49203_work_mode_raw')|int %}
        {% set map = {
          1:"Self Use",
          2:"Feed-in Priority",
          3:"Backup",
          4:"Peak Shaving"
        } %}
        {{ map.get(m,"Unknown") }}

      options: >
        {{ [
          "Self Use",
          "Feed-in Priority",
          "Backup",
          "Peak Shaving"
        ] }}

      select_option:
        service: modbus.write_register
        data:
          hub: foxess_modbus
          slave: 247
          address: 49203
          value: >
            {% set map = {
              "Self Use":1,
              "Feed-in Priority":2,
              "Backup":3,
              "Peak Shaving":4
            } %}
            {{ map[option] }}
